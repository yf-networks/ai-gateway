services:
  # Before starting, ensure conf/ files exist (they are tracked in git):
  #   ls conf/ai_gateway_api.toml conf/bfe.conf conf/name_conf.data
  # If any file is missing, Docker will create a directory instead,
  # causing a "not a directory" mount error.
  #
  # Docker Compose mirror usage:
  #   Replace image references from ghcr.io to your mirror registry.
  #   Example (ghcr.io -> ghcr.nju.edu.cn):
  #     image: ghcr.io/cc14514/mysql:8
  #     → image: ghcr.nju.edu.cn/cc14514/mysql:8
  mysql:
    image: ghcr.nju.edu.cn/cc14514/mysql:8
    container_name: mysql.ai-gateway-system
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: open_bfe
    ports:
      - "3306:3306"
    # Persistent storage (uncomment for production, replace ./mysql-data with a persistent path):
    # volumes:
    #   - ./mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "--password=root123", "--silent"]
      interval: 10s
      timeout: 6s
      retries: 30

  redis:
    image: ghcr.nju.edu.cn/cc14514/redis:6.2
    container_name: redis.ai-gateway-system
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 6s
      retries: 10

  ai-gateway:
    image: ghcr.nju.edu.cn/yf-networks/ai-gateway:v0.2.0
    container_name: ai-gateway
    ports:
      - "8080:8080"
      - "8183:8183"
      - "8284:8284"
      - "8421:8421"
      - "8443:8443"
      - "8992:8992"

    volumes:
      - ./conf/ai_gateway_api.toml:/home/work/api-server/conf/ai_gateway_api.toml
      - ./conf/name_conf.data:/home/work/api-server/conf/name_conf.data
      - ./conf/name_conf.data:/home/work/bfe/conf/name_conf.data
      - ./conf/bfe.conf:/home/work/bfe/conf/bfe.conf
      - ./conf/log-reader/:/home/work/log-reader/conf/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Test backend simulator (not a base service, for functional validation only).
  # After startup, configure a forwarding rule in Dashboard to verify end-to-end routing.
  vllm-sim:
    image: ghcr.nju.edu.cn/cc14514/llm-simulator:latest
    container_name: vllm-sim
    ports:
      - "8000:8000"
    profiles:
      - test

  # ──────────────────────────────────────────────────────────────────────
  # Observability stack (optional).
  # Enable with: docker compose --profile observability up -d
  # Data flow: BFE → log-reader → Kafka → Doris → Grafana
  # All services use emptyDir/ephemeral storage — data lost on restart.
  # ──────────────────────────────────────────────────────────────────────

  kafka:
    image: ghcr.nju.edu.cn/cc14514/kafka:3.7.1
    container_name: kafka.ai-gateway-system
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "0"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka.ai-gateway-system:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@localhost:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "2"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
    profiles:
      - observability

  kafka-init:
    image: ghcr.nju.edu.cn/cc14514/kafka:3.7.1
    container_name: kafka-init.ai-gateway-system
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Kafka to be ready..."
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka.ai-gateway-system:9092 --list 2>/dev/null; do
          echo "  Kafka not ready, retrying in 3s..."
          sleep 3
        done
        echo "Creating topics..."
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka.ai-gateway-system:9092 --topic bfe_ai_log --partitions 2 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka.ai-gateway-system:9092 --topic bfe_ai_log_dlq --partitions 2 --replication-factor 1
        echo "Kafka initialization complete."
    depends_on:
      kafka:
        condition: service_started
    profiles:
      - observability

  doris-fe:
    image: ghcr.nju.edu.cn/cc14514/doris-fe:4.1.3
    container_name: doris-fe.ai-gateway-system
    hostname: doris-fe.ai-gateway-system
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        exec /opt/apache-doris/fe/bin/start_fe.sh --console
    ports:
      - "8030:8030"
      - "9030:9030"
    profiles:
      - observability

  doris-be:
    image: ghcr.nju.edu.cn/cc14514/doris-be:4.1.3
    container_name: doris-be.ai-gateway-system
    hostname: doris-be.ai-gateway-system
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -ex
        export SKIP_CHECK_ULIMIT=true
        echo "Waiting for Doris FE to be ready..."
        until mysqladmin ping -h doris-fe.ai-gateway-system -P 9030 -uroot --silent 2>/dev/null; do
          echo "  FE not ready, retrying in 5s..."
          sleep 5
        done
        echo "FE ready, registering BE..."
        mysql -h doris-fe.ai-gateway-system -P 9030 -uroot \
          -e "ALTER SYSTEM ADD BACKEND 'doris-be.ai-gateway-system:9050'" 2>/dev/null || true
        echo "Starting BE..."
        exec /opt/apache-doris/be/bin/start_be.sh --console
    ports:
      - "8040:8040"
    depends_on:
      doris-fe:
        condition: service_started
    profiles:
      - observability

  doris-init:
    image: ghcr.nju.edu.cn/cc14514/mysql:8
    container_name: doris-init.ai-gateway-system
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        echo "Waiting for Doris FE to be ready..."
        until mysqladmin ping -h doris-fe.ai-gateway-system -P 9030 -uroot --silent 2>/dev/null; do
          echo "  FE not ready, retrying in 5s..."
          sleep 5
        done
        echo "FE ready, waiting for FE to be fully initialized..."
        sleep 10
        echo "Waiting for BE to be fully ready..."
        while true; do
          BE_OK=$(mysql -h doris-fe.ai-gateway-system -P 9030 -uroot -sN \
            -e "SHOW BACKENDS" 2>/dev/null | tail -1 | cut -f10,15)
          echo "$$BE_OK" | grep -q "true" && break
          echo "  BE storage not ready yet, retrying in 5s..."
          sleep 5
        done
        echo "BE ready, checking initialization..."
        DB_COUNT=$(mysql -h doris-fe.ai-gateway-system -P 9030 -uroot -sN \
            -e "SELECT COUNT(*) FROM information_schema.SCHEMATA WHERE SCHEMA_NAME='bfe_observability';" 2>/dev/null || echo "0")
        if [ "$$DB_COUNT" -gt 0 ]; then
          echo "Database already initialized, skipping."
          exit 0
        fi
        echo "Starting Doris initialization..."
        for i in 1 2 3; do
          if mysql -h doris-fe.ai-gateway-system -P 9030 -uroot < /sql/01_create_database.sql 2>/dev/null; then
            break
          fi
          echo "  Retry $$i: database creation failed, waiting..."
          sleep 10
        done
        mysql -h doris-fe.ai-gateway-system -P 9030 -uroot bfe_observability < /sql/02_create_detail_table.sql
        mysql -h doris-fe.ai-gateway-system -P 9030 -uroot bfe_observability < /sql/03_create_routine_load.sql
        mysql -h doris-fe.ai-gateway-system -P 9030 -uroot bfe_observability < /sql/04_create_aggregate_table.sql
        mysql -h doris-fe.ai-gateway-system -P 9030 -uroot bfe_observability < /sql/05_create_insert_job.sql
        echo "Doris initialization complete."
    volumes:
      - ./conf/doris/:/sql/:ro
    depends_on:
      doris-fe:
        condition: service_started
    profiles:
      - observability

  grafana:
    image: ghcr.nju.edu.cn/cc14514/grafana:11.5.1
    container_name: grafana.ai-gateway-system
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./conf/grafana/provisioning/:/etc/grafana/provisioning/:ro
      - ./conf/grafana/dashboards/:/etc/grafana/dashboards/:ro
    depends_on:
      doris-fe:
        condition: service_started
    profiles:
      - observability
