---
apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-init-job
spec:
  ttlSecondsAfterFinished: 100
  template:
    metadata:
      labels:
        app: mysql-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Wait for MySQL to be ready
        - name: wait-for-mysql
          image: ghcr.io/cc14514/mysql:8
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              until mysqladmin ping -h mysql.ai-gateway-system.svc.cluster.local -uroot --password="$MYSQL_ROOT_PASSWORD" --silent; do
                echo "MySQL is not ready yet, sleeping 5s..."
                sleep 5
              done
              echo "MySQL is ready!"
              sleep 5
      containers:
        - name: mysql-init
          image: ghcr.io/cc14514/mysql:8
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password
          command:
            - sh
            - -c
            - |
              set -eu
              echo "Checking if database is already initialized..."
              TABLE_COUNT=$(mysql --protocol=tcp --connect-timeout=10 -h mysql.ai-gateway-system.svc.cluster.local -uroot --password="$MYSQL_ROOT_PASSWORD" -sN \
                  -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='open_bfe' AND table_name='users';" 2>/dev/null || echo "0")
              if [ "$TABLE_COUNT" -gt 0 ]; then
                  echo "Database already initialized, skipping."
                  exit 0
              fi
              echo "Starting database initialization..."
              mysql --protocol=tcp --connect-timeout=10 -h mysql.ai-gateway-system.svc.cluster.local -uroot --password="$MYSQL_ROOT_PASSWORD" < /init-scripts/db_ddl.sql
              echo "Database initialization completed!"
          volumeMounts:
            - name: init-scripts
              mountPath: /init-scripts
      volumes:
        - name: init-scripts
          configMap:
            name: mysql-init

