apiVersion: v1
kind: ConfigMap
metadata:
  name: bfe-config
data:
  # conf/server_data_conf/name_conf.data
  name_conf.data: |
    {
        "Version": "init version",
        "Config": {
            "BFE.poc-redis-wx": [{
                    "Host": "redis.ai-gateway-system.svc.cluster.local",
                    "Port":  6379,
                    "Weight": 10
            }]
        }
    }

  bfe.conf: |
    [Server]
    # listen port for http request
    HttpPort = 8080
    # listen port for https request
    HttpsPort = 8443
    # listen port for monitor request
    MonitorPort = 8421
    # if false, disable monitor server
    MonitorEnabled = true

    # max number of CPUs to use (0 to use all CPUs)
    MaxCpus = 0

    # type of layer-4 load balancer (PROXY/NONE), default NONE
    Layer4LoadBalancer = ""

    # tls handshake timeout, in seconds
    TlsHandshakeTimeout = 30

    # read timeout, in seconds
    ClientReadTimeout = 60

    # write timeout, in seconds
    ClientWriteTimeout = 60

    # if false, client connection is shutdown disregard of http headers
    KeepAliveEnabled = true

    # if true, support ai gateway mode
    EnableAiGateway = true

    # timeout for graceful shutdown (maximum 300 sec)
    GracefulShutdownTimeout = 10

    # max header length in bytes in request
    MaxHeaderBytes = 1048576

    # max URI(in header) length in bytes in request
    MaxHeaderUriBytes = 8192

    # server_data_conf related confs
    HostRuleConf = server_data_conf/host_rule.data
    VipRuleConf = server_data_conf/vip_rule.data
    RouteRuleConf = server_data_conf/route_rule.data
    ClusterConf = server_data_conf/cluster_conf.data
    NameConf = server_data_conf/name_conf.data

    # gslb related confs 
    ClusterTableConf = cluster_conf/cluster_table.data
    GslbConf = cluster_conf/gslb.data

    Modules = mod_trust_clientip
    # Modules = mod_tcp_keepalive
    Modules = mod_block
    Modules = mod_header
    Modules = mod_rewrite
    Modules = mod_redirect
    Modules = mod_logid
    Modules = mod_tag
    Modules = mod_trace
    #Modules = mod_userid
    #Modules = mod_key_log
    Modules = mod_access
    Modules = mod_prison
    #Modules = mod_auth_request
    # Modules = mod_cors
    Modules = mod_wasm

    Modules = mod_unified_waf
    Modules = mod_ai_token_auth
    Modules = mod_body_process
    Modules = mod_ai_rate_limit

    Modules = mod_access_pb3
    Modules = mod_session_sticky

    # interval for get diff of proxy-state
    MonitorInterval = 20

    DebugServHttp = false
    DebugBfeRoute = false
    DebugBal = false
    DebugHealthCheck = false

    [HttpsBasic]
    # cert conf for https
    ServerCertConf = tls_conf/server_cert_conf.data

    # tls rule for https
    TlsRuleConf = tls_conf/tls_rule_conf.data

    # supported cipherSuites preference settings

    # ciphersuites implemented in golang
    #     TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
    #     TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
    #     TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
    #     TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
    #     TLS_ECDHE_RSA_WITH_RC4_128_SHA
    #     TLS_ECDHE_ECDSA_WITH_RC4_128_SHA
    #     TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA
    #     TLS_ECDHE_ECDSA_WITH_AES_128_CBC_SHA
    #     TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA
    #     TLS_ECDHE_ECDSA_WITH_AES_256_CBC_SHA
    #     TLS_RSA_WITH_RC4_128_SHA
    #     TLS_RSA_WITH_AES_128_CBC_SHA
    #     TLS_RSA_WITH_AES_256_CBC_SHA
    #     TLS_ECDHE_RSA_WITH_3DES_EDE_CBC_SHA
    #     TLS_RSA_WITH_3DES_EDE_CBC_SHA
    #
    # Note:
    # -. Do not use cipher suite with 3DES which is insecure now 
    #    and with poor performance
    #
    # -. Equivalent cipher suites (cipher suites with same priority in server side):
    #    CipherSuites=TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256|TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
    #    CipherSuites=TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256|TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
    #
    CipherSuites=TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256|TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
    CipherSuites=TLS_ECDHE_RSA_WITH_RC4_128_SHA
    CipherSuites=TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA
    CipherSuites=TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA
    CipherSuites=TLS_RSA_WITH_RC4_128_SHA
    CipherSuites=TLS_RSA_WITH_AES_128_CBC_SHA
    CipherSuites=TLS_RSA_WITH_AES_256_CBC_SHA

    # supported curve preference settings
    #
    # curves implemented in golang: 
    #     CurveP256 
    #     CurveP384 
    #     CurveP521
    #
    # Note:
    # - Do not use CurveP384/CurveP521 which is with poor performance
    #
    CurvePreferences=CurveP256

    # support Sslv2 ClientHello for compatible with ancient 
    # TLS capable clients (mozilla 5, java 5/6, openssl 0.9.8 etc)
    EnableSslv2ClientHello = true

    # client ca certificates base directory
    # Note: filename suffix for ca certificate file should be ".crt", eg. example_ca_bundle.crt
    ClientCABaseDir = tls_conf/client_ca

    # client certificate crl base directory
    # Note: filename suffix for crl file should be ".crl", eg. example_ca_bundle.crl
    ClientCRLBaseDir = tls_conf/client_crl

    [SessionCache]
    # disable tls session cache or not
    SessionCacheDisabled = true

    # tcp address of redis server
    Servers = "example.redis.cluster"

    # prefix for cache key
    KeyPrefix = "bfe"

    # connection params (ms)
    ConnectTimeout = 50
    ReadTimeout = 50
    WriteTimeout = 50

    # max idle connections in connection pool
    MaxIdle = 20

    # expire time for tls session state (second)
    SessionExpire = 3600

    [SessionTicket]
    # disable tls session ticket or not
    SessionTicketsDisabled = true
    # session ticket key
    SessionTicketKeyFile = tls_conf/session_ticket_key.data

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: conf-agent-config
data:
  conf-agent.toml: |
    [Logger]
    LogDir      = "./log/"
    LogName     = "conf_agent"
    LogLevel    = "INFO"
    RotateWhen  = "MIDNIGHT"
    BackupCount = 2
    Format      = "[%D %T] [%L] [%S] %M"
    StdOut      = false
    
    [Basic]
    BFECluster              = "BFE-AI_product.szyf"
    BFEConfDir              = "/home/work/bfe/conf"
    BFEMonitorPort          = 8421
    BFEReloadTimeoutMs      = 1500
    
    ReloadIntervalMs        = 5000
    
    ConfServer              = "http://127.0.0.1:8183"
    # Token 获取参考 https://github.com/bfenetworks/dashboard/blob/develop/docs/zh-cn/user-guide/system-view/user-management.md#token%E7%AE%A1%E7%90%86
    ConfTaskHeaders         = {"Authorization" = "Token c5QFb-MrlKktJbOid2M3"}
    ConfTaskTimeoutMs       = 1500
    
    ExtraFileServer         = "http://127.0.0.1:8183/inner-api/v1/configs/extra_files/"
    # Token 获取参考 https://github.com/bfenetworks/dashboard/blob/develop/docs/zh-cn/user-guide/system-view/user-management.md#token%E7%AE%A1%E7%90%86
    ExtraFileTaskHeaders    = {"Authorization" = "Token c5QFb-MrlKktJbOid2M3"}
    ExtraFileTaskTimeoutMs  = 1500
    
    
    # reloader for server_data_config files, detail see https://www.bfe-networks.net/en_us/configuration/server_data_conf/host_rule.data/
    [Reloaders.server_data_conf]
    CopyFiles       = ["cluster_conf.data", "host_rule.data", "name_conf.data", "route_rule.data", "vip_rule.data"]
    [[Reloaders.server_data_conf.MultiKeyFileTasks]]
    ConfAPI         = "/inner-api/v1/configs/tls_conf/server_data_conf"
    Key2ConfFile    = {"HostTable" = "host_rule.data", "RouteTable" = "route_rule.data", "ClusterConf" = "cluster_conf.data"}
    
    # # reloader for cluster_conf files, detail see https://www.bfe-networks.net/en_us/configuration/cluster_conf/gslb.data/
    [Reloaders.cluster_conf]
    BFEReloadAPI    = "/reload/gslb_data_conf"
    CopyFiles       = ["cluster_table.data", "gslb.data"]
    [[Reloaders.cluster_conf.NormalFileTasks]]
    ConfAPI         = "/inner-api/v1/configs/gslb_data/cluster_table"
    ConfFileName    = "cluster_table.data"
    [[Reloaders.cluster_conf.NormalFileTasks]]
    ConfAPI         = "/inner-api/v1/configs/gslb_data/gslb"
    ConfFileName    = "gslb.data"
    
    
    [Reloaders.mod_ai_token_auth]
    BFEReloadAPI    = "/reload/mod_ai_token_auth"
    ReloadFile = "token_rule.data"
    CopyFiles       = ["token_rule.data", "mod_ai_token_auth.conf"]
    [[Reloaders.mod_ai_token_auth.NormalFileTasks]]
    ConfAPI         = "/inner-api/v1/configs/mod-api-key"
    ConfFileName    = "token_rule.data"
    
    [Reloaders.mod_ai_rate_limit]
    BFEReloadAPI    = "/reload/mod_ai_rate_limit"
    ReloadFile = "ai_rate_limit.data"
    CopyFiles       = ["ai_rate_limit.data", "mod_ai_rate_limit.conf"]
    [[Reloaders.mod_ai_rate_limit.NormalFileTasks]]
    ConfAPI         = "/inner-api/v1/configs/rate-limit-policy"
    ConfFileName    = "ai_rate_limit.data"
    
    [Reloaders.mod_body_process]
    BFEReloadAPI    = "/reload/mod_body_process"
    ReloadFile = "body_process_rule.data"
    CopyFiles       = ["body_process_rule.data", "mod_body_process.conf"]
    [[Reloaders.mod_body_process.NormalFileTasks]]
    ConfAPI         = "/inner-api/v1/configs/mod-body-process"
    ConfFileName    = "body_process_rule.data"
    
    # # reloader for tls_conf files, detail see https://www.bfe-networks.net/en_us/configuration/tls_conf/server_cert_conf.data/
    [Reloaders.tls_conf]
    CopyFiles      = ["client_ca", "client_crl", "server_cert_conf.data", "session_ticket_key.data", "tls_rule_conf.data"]
    [[Reloaders.tls_conf.ExtraFileTasks]]
    ConfAPI             = "/inner-api/v1/configs/protocol/server_cert_conf"
    ConfFileName        = "server_cert_conf.data"
    ExtraFileJSONPaths  = ["$.Config.CertConf.*.ServerCertFile", "$.Config.CertConf.*.ServerKeyFile"]

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: log-reader-config
  namespace: ai-gateway-system
data:
  config.conf: |
    [main]
    # http port for monitor and reload
    httpPort=8992

    # max number of CPUs to use
    maxCpus = 6

    # interval for get diff of proxy-state
    monitorInterval = 60

    # for bfe_access_pb
    [PbAccessLogConf]
    LogFile = /home/work/bfe/log/pb_access3.log
    Modules=mod_kafka
    MaxSizePerBatch = 128

  mod_kafka.conf: |
    [Basic]
    DataPath = kafka_config.data
    OpenDebug = false

    [kafka]
    # Brokers = kafka1:9092,kafka2:9092
    Brokers = kafka.ai-gateway-system:9092

    # target topic
    Topic = bfe_ai_log

    # dead letter topic (failed messages are written here)
    DeadLetterTopic = bfe_ai_log_dlq

    # compression: none / snappy / gzip / lz4 / zstd
    Compression = zstd

    # batch size
    BatchSize = 100

    # batch linger time in milliseconds
    LingerMs = 100

    # max retries
    MaxRetries = 3

  kafka_config.data: |
    # kafka_config.data

    [ConfFields]
    FieldMode = customized
    FieldNames= logid
    FieldNames= timestamp
    FieldNames= product
    FieldNames= hostid
    FieldNames= client_ip
    FieldNames= is_trust_src_ip
    FieldNames= err_code
    FieldNames= err_msg
    FieldNames= req_header_len
    FieldNames= req_body_len
    FieldNames= proto
    FieldNames= header_host
    FieldNames= origin_uri
    FieldNames= final_uri
    FieldNames= method
    FieldNames= content_type
    FieldNames= x_forward_for
    FieldNames= accept_language
    FieldNames= authorization
    FieldNames= transfer_encoding
    FieldNames= cluster
    FieldNames= sub_cluster
    FieldNames= backend_info
    FieldNames= backend_retry
    FieldNames= res_status_code
    FieldNames= res_header_len
    FieldNames= res_body_len
    FieldNames= res_content_type
    FieldNames= all_time
    FieldNames= read_client_time
    FieldNames= cluster_serve_time
    FieldNames= backend_serve_time
    FieldNames= write_client_time
    FieldNames= connect_backend_time
    FieldNames= proxy_delay_time
    FieldNames= ai_apikey
    FieldNames= ai_apikeytags
    FieldNames= ai_requested_model
    FieldNames= ai_mapped_model
    FieldNames= ai_stream
    FieldNames= ai_prompt_tokens
    FieldNames= ai_output_tokens
    FieldNames= ai_total_tokens
    FieldNames= ai_ttft_us
    FieldNames= ai_tpot_us
    FieldNames= ai_rate_limit_hits
    FieldNames= ai_auth_reject_reason
    FieldNames= ai_auth_reject_quota_plans